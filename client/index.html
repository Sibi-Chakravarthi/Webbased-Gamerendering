<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulation Telemetry Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <header class="dash-header">
            <h1>SYS.SIMULATION // ENVIRONMENT RENDERING</h1>
            <div class="status-indicator">STATUS: ONLINE</div>
        </header>

        <div class="main-display">
            <aside class="side-panel left-panel">
                <h3>TELEMETRY</h3>
                <p>X: <span id="posX">--</span></p>
                <p>Y: <span id="posY">--</span></p>
                <p>FPS: <span id="fpsCounter">--</span></p>
            </aside>

            <div class="monitor-bezel">
                <div class="crt-overlay"></div>
                <canvas id="gameCanvas" width="640" height="480"></canvas>
            </div>

            <aside class="side-panel right-panel">
                <h3>RADAR</h3>
                <div id="radar-container">
                    <canvas id="radarCanvas" width="150" height="150"></canvas>
                </div>
            </aside>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
